<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa 2 Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./terrain-editor.css" />
  </head>
  <body data-map-id="map-2" data-json-path="./configs/editable/map-2.json">
    <div class="shell">
      <aside class="panel">
        <div class="panel-header">
          <p class="eyebrow">Editor Local</p>
          <div class="language-switcher" aria-label="Language switcher">
            <button class="language-option" type="button" data-language="es" aria-label="Español">🇪🇸</button>
            <button class="language-option" type="button" data-language="en" aria-label="English">🇬🇧</button>
          </div>
        </div>
        <div>
          <h1 id="editor-title">Mapa 2</h1>
          <p id="editor-subtitle" class="muted"></p>
        </div>

        <section class="card">
          <button id="connect-json" class="primary">Vincular JSON</button>
          <p id="editor-status" class="status"></p>
        </section>

        <section class="card">
          <h2>Pieza</h2>
          <p id="piece-info" class="muted">Selecciona una pieza y arrastrala.</p>
          <div class="angle-row">
            <button id="angle-down" class="ghost">-1°</button>
            <output id="angle-value" class="angle-value">0°</output>
            <button id="angle-up" class="ghost">+1°</button>
          </div>
          <button id="reset-piece" class="ghost">Reset pieza</button>
        </section>
      </aside>

      <main class="workspace">
        <div class="board-frame">
          <div id="board" class="board" aria-label="Editor de terreno">
            <img id="board-image" alt="Mapa 2" />
            <svg id="terrain-layer" class="terrain-layer" viewBox="0 0 44 60" preserveAspectRatio="none"></svg>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./terrain-editor.js"></script>
  </body>
</html>
